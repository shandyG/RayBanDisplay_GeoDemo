<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ray-Ban Display Marker Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <section class="hud" aria-label="AR marker HUD">
      <div class="topbar">
        <div>
          <strong>Shin-Sakuragaoka Marker Demo</strong>
          <span id="mode">GPS/IMU待機中</span>
        </div>
        <button id="permissionBtn" type="button">センサー許可</button>
      </div>

      <div id="compass" class="compass">方位 --°</div>
      <div id="radar" class="radar" aria-hidden="true"></div>
      <div id="markerLayer" class="marker-layer"></div>
      <div class="reticle" aria-hidden="true">+</div>

      <aside id="detailPanel" class="detail-panel" hidden>
        <button id="closeDetail" class="close" type="button">×</button>
        <p class="eyebrow">選択中</p>
        <h1 id="detailTitle"></h1>
        <p id="detailDistance"></p>
        <p id="detailBody"></p>
        <p id="detailSource" class="source"></p>
      </aside>

      <footer class="controls">
        <button id="prevBtn" type="button">←</button>
        <button id="selectBtn" type="button">選択</button>
        <button id="nextBtn" type="button">→</button>
        <button id="demoBtn" type="button">デモ位置</button>
      </footer>
    </section>
  </main>
  <script src="markers.js"></script>
  <script src="app.js"></script>
</body>
</html>
